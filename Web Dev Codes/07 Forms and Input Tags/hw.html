<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework</title>
</head>

<body>
    <h1> Write a vertically aligned form asking name, city and Pincode of a user.</h1>
    <form action="post">
        <Div>
            <label for="Username"> Username: </label>
            <input type="text" id="Username" name="Username" placeholder="Name for Fill-up">
        </Div>
        <Div>
            <label for="City"> City: </label>
            <input type="text" id="City" name="City" placeholder="City">
        </Div>
        <Div>
            <label for="Pincode"> Pincode: </label>
            <input type="text" id="Pincode" name="Pincode" placeholder="Pincode">
        </Div>
    </form>
    .
    .
    <h2> Using the form inside a table approach.</h2>
    <form action="post">
    <table>
        <tr>
            <td><label for="Username">Username:</label></td>
            <td><input type="text" id="Username" name="Username" placeholder="Name for Fill-up"></td>
        </tr>

        <tr>
            <td><label for="City">City:</label></td>
            <td><input type="text" id="City" name="City" placeholder="City"></td>
        </tr>

        <tr>
            <td><label for="Pincode">Pincode:</label></td>
            <td><input type="text" id="Pincode" name="Pincode" placeholder="Pincode"></td>
        </tr>
    </table>
</form>
.
.
</body>

</html>
